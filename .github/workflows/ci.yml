name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-contract:
    name: Repo contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/repo-contract.sh

  docs-gates:
    name: Docs gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/docs-target-blank-rel-noopener.sh
      - run: bash tests/docs-no-http-links.sh
      - run: bash tests/docs-no-inline-handlers.sh

  polish-gates:
    name: Polish gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/man-page-no-trailing-whitespace.sh
      - run: bash tests/man-page-final-newline.sh
      - run: bash tests/man-page-synopsis-section.sh
      - run: bash tests/tests-shell-executable.sh
      - run: bash tests/tests-shell-shebang.sh

  semantic-gates:
    name: Semantic gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/docs-has-h1.sh
      - run: bash tests/docs-no-deprecated-tags.sh
      - run: bash tests/docs-no-placeholder-href.sh

  newline-gates:
    name: Newline + README gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/readme-final-newline.sh
      - run: bash tests/docs-final-newline.sh
      - run: bash tests/workflow-final-newline.sh
      - run: bash tests/cargo-final-newline.sh
      - run: bash tests/readme-has-https-link.sh

  structure-gates:
    name: Structure gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/readme-has-h2-section.sh
      - run: bash tests/readme-has-badges.sh
      - run: bash tests/docs-has-html-closing.sh
      - run: bash tests/docs-has-body-tag.sh
      - run: bash tests/workflow-no-tabs.sh

  # Parse every .stk file with the real stryke binary, install the
  # package into the global store, and run the t/ test suite. Grabs a
  # prebuilt tarball from strykelang's release page — no rustup, no
  # cargo install on the runner. Hard fail on any parse error or
  # failing assertion.
  stryke-parse-and-test:
    name: Stryke parse + tests (lib + bin + t + examples)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stryke from latest GitHub release
        run: |
          set -euo pipefail
          TAG=$(gh release view --repo MenkeTechnologies/strykelang \
              --json tagName --jq '.tagName')
          ASSET="stryke-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
          gh release download "${TAG}" --repo MenkeTechnologies/strykelang \
              --pattern "${ASSET}" --output /tmp/stryke.tar.gz
          mkdir -p "${HOME}/.local/bin"
          tar -C "${HOME}/.local/bin" -xzf /tmp/stryke.tar.gz
          chmod +x "${HOME}/.local/bin"/{stryke,st,s} 2>/dev/null || true
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          "${HOME}/.local/bin/stryke" --version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Syntax-check every .stk file
        run: |
          set -uo pipefail
          fail=0
          for f in lib/*.stk bin/*.stk t/*.stk examples/*.stk; do
              [[ -f "$f" ]] || continue
              out=$(stryke -c "$f" 2>&1)
              if [[ "$out" == *"syntax OK"* ]]; then
                  echo "OK   $f"
              else
                  echo "FAIL $f"
                  printf '%s\n' "$out" | head -5 | sed 's/^/        /'
                  fail=1
              fi
          done
          exit $fail
      - name: Install package into global store
        run: s pkg install -g .
      - name: Run t/ test suite
        run: s test t/
      - name: Verify doc counts match source
        run: scripts/check-counts.sh
