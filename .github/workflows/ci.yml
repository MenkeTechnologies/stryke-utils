name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-contract:
    name: Repo contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/repo-contract.sh

  docs-gates:
    name: Docs gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/docs-target-blank-rel-noopener.sh
      - run: bash tests/docs-no-http-links.sh
      - run: bash tests/docs-no-inline-handlers.sh

  polish-gates:
    name: Polish gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/man-page-no-trailing-whitespace.sh
      - run: bash tests/man-page-final-newline.sh
      - run: bash tests/man-page-synopsis-section.sh
      - run: bash tests/tests-shell-executable.sh
      - run: bash tests/tests-shell-shebang.sh

  semantic-gates:
    name: Semantic gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/docs-has-h1.sh
      - run: bash tests/docs-no-deprecated-tags.sh
      - run: bash tests/docs-no-placeholder-href.sh

  newline-gates:
    name: Newline + README gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/readme-final-newline.sh
      - run: bash tests/docs-final-newline.sh
      - run: bash tests/workflow-final-newline.sh
      - run: bash tests/cargo-final-newline.sh
      - run: bash tests/readme-has-https-link.sh

  structure-gates:
    name: Structure gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/readme-has-h2-section.sh
      - run: bash tests/readme-has-badges.sh
      - run: bash tests/docs-has-html-closing.sh
      - run: bash tests/docs-has-body-tag.sh
      - run: bash tests/workflow-no-tabs.sh

  # Best-effort: install stryke and parse every .stk file. The test-runner
  # use-resolution bug for `use Foo::Bar` against project-local `lib/` is
  # tracked upstream; we don't gate CI on `s test t/` until it's fixed,
  # but we DO gate on parse-clean for every .stk file shipped in this repo.
  stryke-parse:
    name: Stryke parse (lib + bin + t + examples)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install stryke
        run: |
          set -euo pipefail
          if ! command -v cargo >/dev/null 2>&1; then
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
                  | sh -s -- -y --default-toolchain stable
              source "$HOME/.cargo/env"
          fi
          cargo install --git https://github.com/MenkeTechnologies/strykelang \
              --bin stryke --locked || \
              cargo install --git https://github.com/MenkeTechnologies/strykelang \
                  --bin stryke
      - name: Syntax-check every .stk file
        run: |
          set -euo pipefail
          fail=0
          for f in lib/*.stk bin/*.stk t/*.stk examples/*.stk; do
              [[ -f "$f" ]] || continue
              if stryke -c "$f" 2>&1 | grep -qE "syntax OK"; then
                  echo "OK   $f"
              else
                  echo "FAIL $f"
                  stryke -c "$f" 2>&1 | head -5 | sed 's/^/        /'
                  fail=1
              fi
          done
          exit $fail
