[package]
name = "stryke-utils"
version = "0.15.0"
description = "Pure-stryke utility belt: String / List / Hash / Num / Time / Path helpers. No cdylib, no helper binary — just .stk modules loaded on `use Utils`."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-utils"
edition = "2026"

# Pure-stryke package — no [ffi] table, no cdylib. Everything lives in
# lib/*.stk and is resolved by stryke's normal package loader.

[scripts]
test    = "s test t/"
install = "s pkg install -g ."
